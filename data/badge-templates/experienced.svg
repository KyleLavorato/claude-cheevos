<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Gold trophy for Experienced -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shine">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Trophy base -->
  <rect x="45" y="85" width="30" height="8" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1"/>

  <!-- Trophy stem -->
  <rect x="55" y="70" width="10" height="15" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1"/>

  <!-- Trophy cup -->
  <path d="M 40 30 L 35 70 L 85 70 L 80 30 Z"
        fill="url(#goldGrad)" stroke="#B8860B" stroke-width="2"/>

  <!-- Cup handles -->
  <path d="M 35 40 Q 25 45, 30 55 L 35 55"
        fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <path d="M 85 40 Q 95 45, 90 55 L 85 55"
        fill="none" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- Shine effect -->
  <ellipse cx="50" cy="45" rx="15" ry="20" fill="url(#shine)"/>

  <!-- Star on cup -->
  <polygon points="60,40 62,46 68,46 63,50 65,56 60,52 55,56 57,50 52,46 58,46"
           fill="#FFFFFF" opacity="0.9"/>

  <!-- Text -->
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#B8860B" text-anchor="middle">EXPERIENCED</text>
</svg>
