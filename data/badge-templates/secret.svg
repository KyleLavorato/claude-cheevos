<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Mystery box for Secret -->
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7B68EE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6A5ACD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#483D8B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Box -->
  <rect x="30" y="45" width="60" height="50" rx="5"
        fill="url(#boxGrad)" stroke="#2E1A47" stroke-width="2"/>

  <!-- Box lid -->
  <rect x="25" y="35" width="70" height="15" rx="3"
        fill="url(#boxGrad)" stroke="#2E1A47" stroke-width="2"/>

  <!-- Ribbon vertical -->
  <rect x="55" y="35" width="10" height="60" fill="#FFD700" opacity="0.8"/>

  <!-- Ribbon horizontal -->
  <rect x="30" y="60" width="60" height="10" fill="#FFD700" opacity="0.8"/>

  <!-- Question mark -->
  <text x="60" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        fill="#FFD700" text-anchor="middle">?</text>

  <!-- Sparkles -->
  <circle cx="25" cy="30" r="2" fill="#FFD700"/>
  <circle cx="95" cy="40" r="2" fill="#FFD700"/>
  <circle cx="35" cy="25" r="1.5" fill="#FFFFFF"/>
  <circle cx="85" cy="30" r="1.5" fill="#FFFFFF"/>

  <!-- Text -->
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#6A5ACD" text-anchor="middle">SECRET</text>
</svg>
