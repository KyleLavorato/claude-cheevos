name: Publish Release

on:
    workflow_dispatch:

env:
    MAJOR: 1

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go/go.mod

            - name: Calculate version
              id: version
              run: |
                  COMMIT_COUNT=$(git rev-list --count HEAD)
                  VERSION="v${MAJOR}.${COMMIT_COUNT}"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "Version: ${VERSION}"

            - name: Build all platforms
              env:
                  CHEEVOS_HMAC_KEY: ${{ secrets.CHEEVOS_HMAC_KEY }}
              run: VERSION=${{ steps.version.outputs.version }} make dist-zip

            - name: Stamp version into install.sh
              run: |
                  # Extract install.sh from each zip, stamp version, and repackage
                  cd dist
                  DIST_ABS=$(pwd)
                  for zipfile in claude-cheevos-*.zip; do
                      # Create temp dir for this zip
                      tmpdir=$(mktemp -d)
                      unzip -q "$zipfile" -d "$tmpdir"

                      # Stamp version into install.sh
                      sed -i "s/^VERSION=.*/VERSION=\"${{ steps.version.outputs.version }}\"/" "$tmpdir/install.sh"

                      # Repackage back into dist/ using absolute path
                      rm "$zipfile"
                      (cd "$tmpdir" && zip -r -q "$DIST_ABS/$zipfile" .)
                      rm -rf "$tmpdir"
                  done
                  cd ..

            - name: Generate SHA256 checksums
              run: |
                  cd dist
                  sha256sum claude-cheevos-*.zip > SHA256SUMS
                  cat SHA256SUMS
                  cd ..

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.version }}
                  name: ${{ steps.version.outputs.version }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  files: |
                      dist/claude-cheevos-darwin-amd64.zip
                      dist/claude-cheevos-darwin-arm64.zip
                      dist/claude-cheevos-linux-amd64.zip
                      dist/claude-cheevos-linux-arm64.zip
                      dist/claude-cheevos-windows-amd64.zip
                      dist/SHA256SUMS
