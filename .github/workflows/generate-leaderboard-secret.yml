name: Generate Leaderboard Secret

on:
    workflow_dispatch:
        inputs:
            hmac_key:
                description: "CHEEVOS_HMAC_KEY used to build the binary (from make dist output)"
                required: true
                type: string
            token:
                description: "Leaderboard API bearer token"
                required: true
                type: string
            api_url:
                description: "Leaderboard API base URL"
                required: true
                type: string

jobs:
    generate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go/go.mod

            # Mask all sensitive inputs immediately. workflow_dispatch inputs are not
            # automatically redacted by GitHub Actions — explicit masking is required.
            - name: Mask sensitive values
              env:
                  HMAC_KEY: ${{ inputs.hmac_key }}
                  TOKEN: ${{ inputs.token }}
                  API_URL: ${{ inputs.api_url }}
              run: |
                  echo "::add-mask::${HMAC_KEY}"
                  echo "::add-mask::${TOKEN}"
                  echo "::add-mask::${API_URL}"

            - name: Generate leaderboard secret
              env:
                  CHEEVOS_HMAC_KEY: ${{ inputs.hmac_key }}
                  TOKEN: ${{ inputs.token }}
                  API_URL: ${{ inputs.api_url }}
              run: |
                  OUTPUT=$(cd go && go run ./tools/keygen --token "${TOKEN}" --api-url "${API_URL}")
                  BLOB="${OUTPUT#LEADERBOARD_SECRET=}"
                  echo "::add-mask::${BLOB}"
                  printf 'LEADERBOARD_SECRET=%s\n' "${BLOB}" > leaderboard-secret.txt
                  echo "Secret generated successfully."

            - name: Upload secret artifact
              uses: actions/upload-artifact@v4
              with:
                  name: leaderboard-secret
                  path: leaderboard-secret.txt
                  retention-days: 1
