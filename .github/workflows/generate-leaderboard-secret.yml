name: Generate Leaderboard Secret

on:
    workflow_dispatch:
        inputs:
            token:
                description: "Leaderboard API bearer token"
                required: true
                type: string
            api_url:
                description: "Leaderboard API base URL"
                required: true
                type: string

jobs:
    generate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go/go.mod

            # Mask inputs immediately so they never appear in subsequent log lines.
            # CHEEVOS_HMAC_KEY is a repository secret and is masked automatically,
            # but workflow_dispatch inputs are not — we mask them explicitly here.
            - name: Mask sensitive values
              env:
                  TOKEN: ${{ inputs.token }}
                  API_URL: ${{ inputs.api_url }}
                  HMAC_KEY: ${{ secrets.CHEEVOS_HMAC_KEY }}
              run: |
                  echo "::add-mask::${TOKEN}"
                  echo "::add-mask::${API_URL}"
                  echo "::add-mask::${HMAC_KEY}"

            - name: Generate leaderboard secret
              env:
                  CHEEVOS_HMAC_KEY: ${{ secrets.CHEEVOS_HMAC_KEY }}
                  TOKEN: ${{ inputs.token }}
                  API_URL: ${{ inputs.api_url }}
              run: |
                  OUTPUT=$(cd go && go run ./tools/keygen --token "${TOKEN}" --api-url "${API_URL}")
                  BLOB="${OUTPUT#LEADERBOARD_SECRET=}"
                  echo "::add-mask::${BLOB}"
                  printf 'LEADERBOARD_SECRET=%s\n' "${BLOB}" > leaderboard-secret.txt
                  echo "Secret generated successfully."

            - name: Upload secret artifact
              uses: actions/upload-artifact@v4
              with:
                  name: leaderboard-secret
                  path: leaderboard-secret.txt
                  retention-days: 1
