name: CI

on:
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go/go.mod

            - name: Test
              run: make test

            - name: Build all platforms
              env:
                  CHEEVOS_HMAC_KEY: ${{ secrets.CHEEVOS_HMAC_KEY }}
              run: make dist
